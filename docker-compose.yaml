services:
  api:
    build:
      context: .
    container_name: Go_APIs

    ports:
      - "8090:8090"

    env_file:
      - .env

    depends_on:
      - mongodb
      - redis

    networks:
      - backend

  mongodb:
    image: mongo:8
    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    networks:
      - backend

  redis:
    image: redis:8-alpine
    container_name: redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - backend

networks:
  backend:

volumes:
  mongo_data:
  redis_data: